<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohàil FX - Free Video to Text AI</title>
    <meta name="description" content="Convert video to text free. AI transcription in your browser. No upload, no limits.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0a0a0a; color:#e0e0e0; min-height:100vh; }
        nav { background:#111; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; border-bottom:1px solid #222; }
        nav .logo { font-size:1.5rem; font-weight:700; background:linear-gradient(135deg,#00ff88,#00ccff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        nav .menu { display:flex; gap:15px; }
        nav .menu a { color:#aaa; text-decoration:none; font-size:0.9rem; transition:0.3s; }
        nav .menu a:hover, nav .menu a.active { color:#00ff88; }
        .container { max-width:650px; margin:0 auto; padding:30px 20px; }
        .card { background:#111; border-radius:20px; padding:30px 20px; text-align:center; border:1px solid #222; }
        .card h1 { font-size:2rem; margin-bottom:10px; background:linear-gradient(135deg,#00ff88,#00ccff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .card p { color:#888; margin-bottom:20px; }
        .upload-area { border:2px dashed #333; border-radius:15px; padding:40px 20px; margin:20px 0; cursor:pointer; transition:0.3s; background:#0a0a0a; }
        .upload-area:hover, .upload-area.dragover { border-color:#00ff88; background:#0a1a0a; }
        .upload-area .icon { font-size:3rem; margin-bottom:10px; }
        .btn { background:linear-gradient(135deg,#00ff88,#00cc88); color:#000; border:none; padding:12px 30px; border-radius:30px; font-weight:700; cursor:pointer; font-size:1rem; margin:10px 5px; transition:0.3s; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(0,255,136,0.4); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        #status { margin:15px 0; color:#00ff88; min-height:25px; }
        .progress { width:100%; height:6px; background:#333; border-radius:10px; overflow:hidden; margin:15px 0; display:none; }
        .progress-fill { width:0%; height:100%; background:linear-gradient(90deg,#00ff88,#00ccff); transition:width 0.3s; }
        .result { background:#000; border-radius:15px; padding:20px; text-align:left; max-height:300px; overflow-y:auto; margin-top:20px; display:none; font-family:monospace; white-space:pre-wrap; border:1px solid #222; }
        .result-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
        .small-btn { background:#1a1a1a; border:1px solid #333; color:#ccc; padding:8px 15px; border-radius:20px; cursor:pointer; font-size:0.8rem; }
        select { background:#1a1a1a; border:1px solid #333; color:#ccc; padding:10px 15px; border-radius:25px; font-size:0.9rem; }
        footer { text-align:center; padding:20px; color:#555; font-size:0.8rem; border-top:1px solid #222; margin-top:40px; }
        @media (max-width:500px) { .card { padding:20px 15px; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">🎬 Sohàil FX</div>
    <div class="menu">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h1>Video → Text AI</h1>
        <p>100% Free • No Upload • Private • Unlimited</p>
        
        <div class="upload-area" id="dropZone">
            <div class="icon">📁</div>
            <p id="fileLabel">Tap to select a video</p>
            <input type="file" id="fileInput" accept="video/*" style="display:none;">
        </div>

        <select id="languageSelect">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ur">Urdu</option>
            <option value="auto">Auto-detect</option>
        </select>

        <button class="btn" id="transcribeBtn" disabled>🔮 Start Transcription</button>

        <div id="status"></div>
        <div class="progress" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="result" id="resultBox">
            <div id="transcriptText"></div>
            <div class="result-actions">
                <button class="small-btn" onclick="copyText()">📋 Copy</button>
                <button class="small-btn" onclick="downloadTXT()">📄 Download .txt</button>
            </div>
        </div>
    </div>
</div>

<footer>
    ✨ Made by <strong>Sohàil FX</strong> ✨<br>
    &copy; 2026 All rights reserved.
</footer>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js';
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const resultBox = document.getElementById('resultBox');
    const transcriptText = document.getElementById('transcriptText');
    const languageSelect = document.getElementById('languageSelect');

    let selectedFile = null;
    let transcriber = null;

    // File selection
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            fileLabel.textContent = '📄 ' + selectedFile.name;
            transcribeBtn.disabled = false;
        }
    });

    // Drag & drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            selectedFile = e.dataTransfer.files[0];
            fileLabel.textContent = '📄 ' + selectedFile.name;
            transcribeBtn.disabled = false;
        }
    });

    // Load libraries
    statusDiv.textContent = '⏳ Loading...';
    const ffmpeg = new FFmpeg();
    await ffmpeg.load();
    statusDiv.textContent = '⏳ Downloading AI model (first time ~140MB)...';

    try {
        transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base', {
            progress_callback: (info) => {
                if (info.status === 'progress' && info.total) {
                    const pct = Math.round((info.loaded / info.total) * 100);
                    statusDiv.textContent = '⏳ Downloading AI model... ' + pct + '%';
                }
            }
        });
        statusDiv.textContent = '✅ Ready! Select a video and tap Transcribe.';
    } catch(e) {
        statusDiv.textContent = '❌ Failed to load AI model. Check internet and refresh.';
        console.error(e);
    }

    // Transcribe
    transcribeBtn.addEventListener('click', async () => {
        if (!selectedFile || !transcriber) return;
        transcribeBtn.disabled = true;
        resultBox.style.display = 'none';
        progressBar.style.display = 'block';
        progressFill.style.width = '10%';
        statusDiv.textContent = '🔊 Extracting audio...';

        try {
            const buffer = await selectedFile.arrayBuffer();
            await ffmpeg.writeFile('input.mp4', new Uint8Array(buffer));
            await ffmpeg.exec(['-i', 'input.mp4', '-vn', '-acodec', 'pcm_s16le', '-ar', '16000', '-ac', '1', 'output.wav']);
            const audioData = await ffmpeg.readFile('output.wav');
            progressFill.style.width = '30%';
            statusDiv.textContent = '🧠 Transcribing...';

            const audioCtx = new AudioContext({ sampleRate: 16000 });
            const audioBuffer = await audioCtx.decodeAudioData(audioData.buffer.slice());
            const pcm = audioBuffer.getChannelData(0);
            progressFill.style.width = '60%';

            const lang = languageSelect.value === 'auto' ? undefined : languageSelect.value;
            const result = await transcriber(pcm, { chunk_length_s: 30, stride_length_s: 5, language: lang });

            progressFill.style.width = '100%';
            statusDiv.textContent = '✅ Done!';
            transcriptText.textContent = result.text;
            resultBox.style.display = 'block';
            transcribeBtn.disabled = false;

            await ffmpeg.deleteFile('input.mp4');
            await ffmpeg.deleteFile('output.wav');
        } catch(err) {
            statusDiv.textContent = '❌ Error: ' + err.message;
            transcribeBtn.disabled = false;
        }
    });

    window.copyText = () => navigator.clipboard.writeText(transcriptText.textContent);
    window.downloadTXT = () => {
        const blob = new Blob([transcriptText.textContent], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'transcript.txt';
        a.click();
    };
</script>
</body>
</html>

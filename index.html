<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohàil FX - Free Video to Text AI</title>
    <meta name="description" content="Convert video to text free. AI transcription in your browser. No upload, private, unlimited.">
    <meta name="keywords" content="video to text, free transcription, AI, Sohàil FX">
    <meta property="og:title" content="Sohàil FX - Video to Text AI">
    <meta property="og:description" content="Free AI transcription. 100% browser-based, private, unlimited.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --card: #f5f5f5;
            --border: #cccccc;
            --accent: #000000;
            --accent-hover: #333333;
            --btn-text: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Navigation */
        nav {
            background: #000;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        nav .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }
        nav .logo span { color: #ccc; font-weight: 400; }
        nav .menu { display: flex; gap: 20px; }
        nav .menu a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        nav .menu a.active, nav .menu a:hover { color: #fff; }
        /* Main Container */
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 15px;
            flex: 1;
        }
        /* Card */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .card h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #000;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }
        .card .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        /* Upload Area */
        .upload-area {
            border: 3px dashed #aaa;
            border-radius: 12px;
            padding: 35px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
            display: block;
            width: 100%;
        }
        .upload-area:hover {
            border-color: #000;
            background: #f0f0f0;
        }
        .upload-area .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }
        .upload-area p {
            color: #555;
            font-size: 1rem;
            font-weight: 500;
            word-break: break-all;
        }
        /* File Input - hidden but functional */
        #fileInput {
            display: none;
        }
        /* Buttons */
        .btn {
            background: #000;
            color: #fff;
            border: 2px solid #000;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 8px 5px;
            letter-spacing: 0.5px;
            width: auto;
            min-width: 200px;
        }
        .btn:hover {
            background: #fff;
            color: #000;
            border-color: #000;
        }
        .btn:disabled {
            background: #ccc;
            color: #888;
            border-color: #ccc;
            cursor: not-allowed;
        }
        .btn-outline {
            background: #fff;
            color: #000;
            border: 2px solid #000;
        }
        .btn-outline:hover {
            background: #000;
            color: #fff;
        }
        /* Select Dropdown */
        select {
            background: #fff;
            border: 2px solid #000;
            color: #000;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin: 8px 5px;
            appearance: auto;
            -webkit-appearance: auto;
            min-width: 150px;
        }
        /* Status */
        #status {
            margin: 15px 0;
            font-weight: 600;
            font-size: 0.95rem;
            min-height: 25px;
            color: #000;
        }
        /* Progress Bar */
        .progress {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #000;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        /* Result Box */
        .result {
            background: #fff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
            display: none;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            color: #000;
        }
        .result-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .small-btn {
            background: #fff;
            border: 2px solid #000;
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .small-btn:hover {
            background: #000;
            color: #fff;
        }
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #000;
            color: #fff;
            font-size: 0.85rem;
            margin-top: auto;
        }
        footer strong { color: #fff; }
        /* Mobile Responsive */
        @media (max-width: 500px) {
            .card { padding: 20px 12px; }
            .card h1 { font-size: 1.6rem; }
            .btn { padding: 12px 20px; min-width: 150px; font-size: 0.9rem; }
            select { padding: 10px 15px; font-size: 0.85rem; }
            .upload-area { padding: 25px 15px; }
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav>
    <div class="logo">SOHÀIL<span>FX</span></div>
    <div class="menu">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<!-- Main Content -->
<div class="container">
    <div class="card">
        <h1>Video → Text</h1>
        <p class="subtitle">Free AI Transcription — No Upload, Private, Unlimited</p>

        <!-- Upload Area -->
        <div class="upload-area" id="uploadBox">
            <span class="icon">🎬</span>
            <p id="fileLabel">Tap here to select a video</p>
        </div>

        <!-- Hidden File Input -->
        <input type="file" id="fileInput" accept="video/*,audio/*">

        <!-- Language Select -->
        <select id="languageSelect">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ur">Urdu</option>
            <option value="ar">Arabic</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="auto">Auto-Detect</option>
        </select>

        <!-- Transcribe Button -->
        <button class="btn" id="transcribeBtn" disabled>▶ Start Transcription</button>

        <!-- Status -->
        <div id="status">Ready to transcribe.</div>

        <!-- Progress -->
        <div class="progress" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Result -->
        <div class="result" id="resultBox">
            <div id="transcriptText"></div>
            <div class="result-actions">
                <button class="small-btn" id="copyBtn">📋 Copy Text</button>
                <button class="small-btn" id="downloadBtn">📥 Download .txt</button>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    ✨ Made by <strong>Sohàil FX</strong> ✨
</footer>

<!-- JavaScript -->
<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js';
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js';

    // DOM Elements
    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const resultBox = document.getElementById('resultBox');
    const transcriptText = document.getElementById('transcriptText');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const languageSelect = document.getElementById('languageSelect');

    let selectedFile = null;
    let transcriber = null;

    // ----- FILE SELECTION -----
    // Click on upload box
    uploadBox.addEventListener('click', function(e) {
        e.preventDefault();
        fileInput.click(); // Open file picker
    });

    // Touch events for mobile
    uploadBox.addEventListener('touchend', function(e) {
        e.preventDefault();
        fileInput.click();
    });

    // When file is selected
    fileInput.addEventListener('change', function() {
        if (fileInput.files && fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            fileLabel.textContent = '📄 ' + selectedFile.name;
            transcribeBtn.disabled = false;
            statusDiv.textContent = 'File selected. Ready to transcribe.';
        }
    });

    // Drag and drop (for desktop)
    uploadBox.addEventListener('dragover', function(e) {
        e.preventDefault();
        uploadBox.style.borderColor = '#000';
        uploadBox.style.background = '#e0e0e0';
    });
    uploadBox.addEventListener('dragleave', function(e) {
        e.preventDefault();
        uploadBox.style.borderColor = '#aaa';
        uploadBox.style.background = '#fff';
    });
    uploadBox.addEventListener('drop', function(e) {
        e.preventDefault();
        uploadBox.style.borderColor = '#aaa';
        uploadBox.style.background = '#fff';
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            selectedFile = e.dataTransfer.files[0];
            fileLabel.textContent = '📄 ' + selectedFile.name;
            transcribeBtn.disabled = false;
            statusDiv.textContent = 'File selected. Ready to transcribe.';
        }
    });

    // ----- LOAD AI MODEL -----
    statusDiv.textContent = '⏳ Loading AI engine...';

    let ffmpeg;
    try {
        ffmpeg = new FFmpeg();
        await ffmpeg.load();
        statusDiv.textContent = '⏳ Downloading AI model (first time ~140MB, one-time)...';
    } catch(e) {
        statusDiv.textContent = '❌ Error loading FFmpeg. Check your internet connection.';
        console.error('FFmpeg error:', e);
    }

    try {
        transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base', {
            progress_callback: function(info) {
                if (info && info.status === 'progress' && info.total) {
                    let pct = Math.round((info.loaded / info.total) * 100);
                    statusDiv.textContent = '⏳ Downloading AI model... ' + pct + '%';
                }
            }
        });
        statusDiv.textContent = '✅ Ready! Select a video and click transcribe.';
    } catch(e) {
        statusDiv.textContent = '❌ Failed to load AI model. Please refresh the page.';
        console.error('Model error:', e);
    }

    // ----- TRANSCRIBE -----
    transcribeBtn.addEventListener('click', async function() {
        if (!selectedFile || !transcriber || !ffmpeg) {
            statusDiv.textContent = '❌ Please select a file first.';
            return;
        }

        transcribeBtn.disabled = true;
        resultBox.style.display = 'none';
        progressBar.style.display = 'block';
        progressFill.style.width = '5%';
        statusDiv.textContent = '🔊 Extracting audio...';

        try {
            // Read file
            const buffer = await selectedFile.arrayBuffer();
            const uint8 = new Uint8Array(buffer);
            
            // Write to virtual filesystem
            await ffmpeg.writeFile('input.mp4', uint8);
            
            // Extract audio
            await ffmpeg.exec(['-i', 'input.mp4', '-vn', '-acodec', 'pcm_s16le', '-ar', '16000', '-ac', '1', 'output.wav']);
            
            const audioData = await ffmpeg.readFile('output.wav');
            progressFill.style.width = '30%';
            statusDiv.textContent = '🧠 Transcribing with AI...';

            // Decode audio
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const audioBuffer = await audioCtx.decodeAudioData(audioData.buffer.slice());
            const pcm = audioBuffer.getChannelData(0);
            progressFill.style.width = '60%';

            // Transcribe
            const lang = languageSelect.value === 'auto' ? undefined : languageSelect.value;
            const result = await transcriber(pcm, {
                chunk_length_s: 30,
                stride_length_s: 5,
                language: lang
            });

            progressFill.style.width = '100%';
            statusDiv.textContent = '✅ Transcription complete!';
            transcriptText.textContent = result.text;
            resultBox.style.display = 'block';
            transcribeBtn.disabled = false;

            // Cleanup
            await ffmpeg.deleteFile('input.mp4');
            await ffmpeg.deleteFile('output.wav');
            
        } catch(err) {
            console.error('Transcription error:', err);
            statusDiv.textContent = '❌ Error: ' + err.message;
            transcribeBtn.disabled = false;
            progressBar.style.display = 'none';
        }
    });

    // ----- COPY -----
    copyBtn.addEventListener('click', function() {
        if (transcriptText.textContent) {
            navigator.clipboard.writeText(transcriptText.textContent).then(() => {
                statusDiv.textContent = '📋 Copied to clipboard!';
            }).catch(() => {
                statusDiv.textContent = '❌ Copy failed. Select and copy manually.';
            });
        }
    });

    // ----- DOWNLOAD -----
    downloadBtn.addEventListener('click', function() {
        if (transcriptText.textContent) {
            const blob = new Blob([transcriptText.textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'transcript.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusDiv.textContent = '📥 Downloaded!';
        }
    });
</script>

</body>
</html>

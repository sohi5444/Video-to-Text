<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohàil FX - Free AI Video to Text Converter</title>
    <meta name="description" content="Convert any video to text for free using Sohàil FX. AI transcription runs 100% in your browser. Unlimited, private, no sign-up.">
    <meta name="keywords" content="video to text, free transcription, Sohàil FX, speech to text, AI transcriber, online video to text">
    <meta property="og:title" content="Sohàil FX - Free Video to Text Converter">
    <meta property="og:description" content="Upload any video and get the transcript instantly. No limits, no cost, fully private.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sohailfx.github.io/video-to-text/">
    <meta property="og:image" content="https://sohailfx.github.io/video-to-text/thumbnail.png">
    <!-- AdSense will go here once approved -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX" crossorigin="anonymous"></script> -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Sohàil FX",
        "url": "https://sohailfx.github.io/video-to-text/",
        "description": "Free AI video transcription in your browser.",
        "applicationCategory": "Multimedia",
        "operatingSystem": "All"
    }
    </script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: rgba(20, 20, 20, 0.85);
            --accent: #00ff88;
            --accent2: #00ccff;
            --text: #e0e0e0;
            --text-secondary: #aaa;
            --glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --btn-text: #000;
        }
        body.light {
            --bg: #f5f5f5;
            --card: rgba(255,255,255,0.9);
            --text: #222;
            --text-secondary: #555;
            --glass: rgba(0,0,0,0.03);
            --border: rgba(0,0,0,0.15);
            --btn-text: #fff;
            --accent: #0070f3;
            --accent2: #00b4d8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 50%, rgba(0,255,136,0.08) 0%, transparent 40%),
                              radial-gradient(circle at 80% 20%, rgba(0,204,255,0.08) 0%, transparent 40%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        .container {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 650px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 30px rgba(0,255,136,0.1);
            text-align: center;
            position: relative;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text);
            transition: 0.3s;
        }
        .badge {
            display: inline-block;
            background: rgba(0,255,136,0.15);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
        .features { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
        .feat-item { background: var(--glass); border-radius: 30px; padding: 5px 16px; font-size: 0.75rem; color: var(--text-secondary); }
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            margin: 1.5rem 0;
            transition: all 0.3s;
            cursor: pointer;
            background: var(--glass);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(0,255,136,0.05);
            box-shadow: 0 0 25px rgba(0,255,136,0.2);
        }
        .upload-icon { font-size: 3rem; margin-bottom: 0.8rem; filter: drop-shadow(0 0 10px var(--accent)); }
        .upload-zone p { color: var(--text-secondary); font-size: 0.95rem; }
        #fileInput { display: none; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 1rem 0; }
        select, .btn {
            padding: 0.7rem 1.2rem;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }
        select:hover { border-color: var(--accent); }
        .btn {
            background: linear-gradient(135deg, var(--accent), #00cc88);
            border: none;
            color: var(--btn-text);
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,255,136,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .progress-wrap { width: 100%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; margin: 1.5rem 0 0.5rem; opacity: 0; transition: opacity 0.3s; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 10px; box-shadow: 0 0 15px var(--accent); transition: width 0.3s ease; }
        .status-text { margin: 0.5rem 0; font-size: 0.9rem; color: var(--accent); min-height: 20px; }
        .result-box {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 1.5rem;
            border: 1px solid #2a2a2a;
            display: none;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 0.8rem; }
        .copy-btn, .download-btn, .share-btn { background: var(--glass); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .copy-btn:hover, .download-btn:hover, .share-btn:hover { background: rgba(0,255,136,0.15); border-color: var(--accent); color: #fff; }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            animation: glow 2.5s infinite alternate;
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }
        .donate-btn { background: #ffdd57; color: #000; padding: 0.4rem 1.2rem; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 0.8rem; transition: 0.2s; }
        .donate-btn:hover { background: #ffc107; }
        @keyframes glow {
            from { text-shadow: 0 0 5px var(--accent); }
            to { text-shadow: 0 0 18px var(--accent), 0 0 30px var(--accent2); }
        }
        .spinner {
            display: inline-block; width: 18px; height: 18px; border: 2px solid #444; border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ad-placeholder { margin: 2rem 0; text-align: center; color: #555; border: 1px dashed #333; padding: 1rem; border-radius: 10px; font-size: 0.8rem; }
        .social-buttons { display: flex; gap: 8px; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌓</button>
    <div class="badge">✨ 100% Free & Unlimited</div>
    <h1>Sohàil FX</h1>
    <p class="subtitle">AI transcription that runs entirely in your browser.<br>No uploads, no limits, total privacy.</p>
    <div class="features">
        <span class="feat-item">🚀 Instant</span>
        <span class="feat-item">🔒 Private</span>
        <span class="feat-item">🎯 Accurate</span>
        <span class="feat-item">🌍 No Sign-up</span>
    </div>

    <div class="upload-zone" id="dropZone">
        <div class="upload-icon">📁</div>
        <p id="fileLabel">Click or drag a video file here</p>
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <div class="controls">
        <select id="languageSelect">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ur">Urdu</option>
            <option value="ar">Arabic</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="zh">Chinese</option>
            <option value="auto">Auto-detect</option>
        </select>
        <button class="btn" id="transcribeBtn" disabled>🔮 Start Transcription</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status-text" id="statusText"></div>

    <div class="result-box" id="resultBox">
        <div id="transcriptOutput"></div>
        <div class="result-actions">
            <button class="copy-btn" onclick="copyText()">📋 Copy</button>
            <button class="download-btn" onclick="downloadTXT()">📄 Download .txt</button>
            <button class="download-btn" onclick="downloadSRT()">🎞️ Download .srt</button>
        </div>
        <div class="social-buttons">
            <button class="share-btn" onclick="shareTwitter()">🐦 Tweet</button>
            <button class="share-btn" onclick="shareWhatsApp()">💬 WhatsApp</button>
            <button class="share-btn" onclick="shareTelegram()">✈️ Telegram</button>
            <button class="share-btn" onclick="copyPageLink()">🔗 Copy Link</button>
        </div>
    </div>

    <!-- AdSense placeholder (replace with your ad code after approval) -->
    <div class="ad-placeholder" id="adContainer">💰 Your Ad Here (Google AdSense)</div>

    <div class="footer">
        <div>✨ Made by <strong>Sohàil FX</strong> ✨</div>
        <a href="https://www.buymeacoffee.com/sohailfx" target="_blank" class="donate-btn">☕ Buy me a coffee</a>
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js';
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js';

    // DOM
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const resultBox = document.getElementById('resultBox');
    const transcriptOutput = document.getElementById('transcriptOutput');
    const languageSelect = document.getElementById('languageSelect');
    const themeToggle = document.getElementById('themeToggle');

    let selectedFile = null;
    let transcriber = null;
    let transcriptionResult = '';

    // Dark/light mode
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    });

    // Drag & drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            fileInput.files = e.dataTransfer.files;
            updateFileSelection();
        }
    });
    fileInput.addEventListener('change', updateFileSelection);

    function updateFileSelection() {
        if (fileInput.files.length > 0) {
            selectedFile = fileInput.files[0];
            fileLabel.textContent = `📄 ${selectedFile.name}`;
            transcribeBtn.disabled = false;
        } else {
            selectedFile = null;
            fileLabel.textContent = 'Click or drag a video file here';
            transcribeBtn.disabled = true;
        }
    }

    // Load FFmpeg
    const ffmpeg = new FFmpeg();
    statusText.innerHTML = '<span class="spinner"></span> Loading FFmpeg core...';
    await ffmpeg.load();
    statusText.innerHTML = '✅ FFmpeg ready. Loading AI model...';

    // Load Whisper with progress
    try {
        transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-base', {
            progress_callback: (info) => {
                if (info.status === 'progress' && info.total) {
                    const percent = Math.round((info.loaded / info.total) * 100);
                    statusText.innerHTML = `⏳ Downloading AI model... ${percent}%`;
                } else if (info.status === 'done') {
                    statusText.innerHTML = '✅ AI model ready! Select a video and click Transcribe.';
                }
            }
        });
    } catch (e) {
        statusText.innerHTML = '❌ Failed to load AI model. Refresh the page.';
        console.error(e);
    }

    // Transcribe
    transcribeBtn.addEventListener('click', async () => {
        if (!selectedFile || !transcriber) return;
        transcribeBtn.disabled = true;
        resultBox.style.display = 'none';
        progressWrap.style.opacity = '1';
        progressFill.style.width = '10%';
        statusText.innerHTML = '🔊 Extracting audio from video...';

        try {
            const videoBuffer = await selectedFile.arrayBuffer();
            await ffmpeg.writeFile('input.mp4', new Uint8Array(videoBuffer));
            await ffmpeg.exec(['-i', 'input.mp4', '-vn', '-acodec', 'pcm_s16le', '-ar', '16000', '-ac', '1', 'output.wav']);
            const audioData = await ffmpeg.readFile('output.wav');
            progressFill.style.width = '30%';
            statusText.innerHTML = '🧠 Transcribing with AI...';

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const audioBuffer = await audioCtx.decodeAudioData(audioData.buffer.slice());
            const pcm = audioBuffer.getChannelData(0);
            progressFill.style.width = '60%';

            const language = languageSelect.value === 'auto' ? undefined : languageSelect.value;
            const result = await transcriber(pcm, {
                chunk_length_s: 30,
                stride_length_s: 5,
                return_timestamps: true,
                language: language
            });

            transcriptionResult = result;
            progressFill.style.width = '100%';
            statusText.innerHTML = '✅ Transcription complete!';
            transcriptOutput.textContent = result.text;
            resultBox.style.display = 'block';
            transcribeBtn.disabled = false;

            await ffmpeg.deleteFile('input.mp4');
            await ffmpeg.deleteFile('output.wav');
        } catch (err) {
            statusText.innerHTML = `❌ Error: ${err.message}`;
            transcribeBtn.disabled = false;
            console.error(err);
        }
    });

    // Copy
    window.copyText = () => navigator.clipboard.writeText(transcriptOutput.textContent);

    // Download TXT
    window.downloadTXT = () => {
        const blob = new Blob([transcriptOutput.textContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'transcript.txt';
        a.click();
        URL.revokeObjectURL(url);
    };

    // Download SRT
    window.downloadSRT = () => {
        if (!transcriptionResult || !transcriptionResult.chunks) {
            alert('No timestamps available. Please transcribe with timestamps enabled.');
            return;
        }
        let srt = '';
        transcriptionResult.chunks.forEach((chunk, i) => {
            const start = formatTime(chunk.timestamp[0]);
            const end = formatTime(chunk.timestamp[1] ?? chunk.timestamp[0] + 1);
            srt += `${i + 1}\n${start} --> ${end}\n${chunk.text.trim()}\n\n`;
        });
        const blob = new Blob([srt], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'transcript.srt';
        a.click();
        URL.revokeObjectURL(url);
    };

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        const ms = Math.floor((seconds % 1) * 1000);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')},${String(ms).padStart(3, '0')}`;
    }

    // Social share
    const pageUrl = encodeURIComponent(window.location.href);
    const pageTitle = encodeURIComponent('Sohàil FX - Free Video to Text Converter');
    window.shareTwitter = () => window.open(`https://twitter.com/intent/tweet?text=${pageTitle}&url=${pageUrl}`, '_blank');
    window.shareWhatsApp = () => window.open(`https://wa.me/?text=${pageTitle}%20${pageUrl}`, '_blank');
    window.shareTelegram = () => window.open(`https://t.me/share/url?url=${pageUrl}&text=${pageTitle}`, '_blank');
    window.copyPageLink = () => {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied!');
    };

    // Register Service Worker for offline caching
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Service Worker registered');
            }).catch(err => console.error('SW registration failed:', err));
        });
    }
</script>
</body>
</html>
